<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loki's Library — A Trickster's Companion</title>
<meta name="description" content="Loki's Library — a quiet corner of Asgard where you keep the books you've read." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<script src="site.js" defer></script>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/loki-app-icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/loki-app-icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/loki-app-icon-512.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Loki" />
<meta name="theme-color" content="#1f3b2c" />
</head>
<body class="page-library">

  <div class="lib-container">
    <div class="lib-header">
      <a class="lib-back" href="index.html">✦ Back to Asgard</a>
      <h1 class="lib-title">Loki's Library</h1>
      <span style="min-width:140px"></span>
    </div>
    <div class="lib-sub">"Every book a small mischief, neatly shelved."</div>

    <div class="shelf">
      <div class="toolbar">
        <span class="lib-count" id="libCount">0 books on the shelf</span>
        <button class="lib-btn ghost" id="addBtn">＋ Add a book</button>
      </div>
      <div class="book-grid" id="bookGrid"></div>
      <div class="empty-shelf" id="emptyMsg" style="display:none;">
        The shelves are empty. Add your first book ✦
      </div>
    </div>
  </div>

  <div class="loki-corner" aria-hidden="true">
    <img src="assets/loki-reading.png" alt="Loki reading in a corner" />
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none" />

  <div class="lib-modal" id="bookModal" role="dialog" aria-modal="true">
    <div class="lib-modal-card">
      <div>
        <div class="lib-modal-cover" id="modalCover"><span>No cover yet</span></div>
        <div class="change-cover">
          <button type="button" id="changeCoverBtn">Change cover image</button>
        </div>
      </div>
      <div class="lib-modal-body">
        <h2 id="modalHeading">Book details</h2>
        <form class="lib-form" id="bookForm" onsubmit="return false;">
          <label for="fTitle">Title</label>
          <input id="fTitle" type="text" maxlength="200" placeholder="The Prose Edda" />

          <label for="fAuthor">Author</label>
          <input id="fAuthor" type="text" maxlength="120" placeholder="Snorri Sturluson" />

          <label for="fDate">Date of reading</label>
          <input id="fDate" type="date" />

          <label for="fSummary">Summary</label>
          <textarea id="fSummary" maxlength="4000" placeholder="A few quiet thoughts about this book..."></textarea>

          <div class="modal-actions">
            <button type="button" class="lib-btn danger" id="deleteBtn" style="display:none;">Remove</button>
            <button type="button" class="lib-btn ghost" id="cancelBtn">Cancel</button>
            <button type="button" class="lib-btn" id="saveBtn">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="pageBackupHost" style="position:fixed; bottom:14px; left:14px; z-index:60;"></div>
</body>
</html>
